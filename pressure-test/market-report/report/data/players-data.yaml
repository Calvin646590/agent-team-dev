# AI 芯片主要市场玩家数据
# 数据说明：所有数值均为示例数据，基于公开报道及行业估算整理，不代表实际审计数据
# 数据基准年：2024 年
# 最后更新：2026-05-26

metadata:
  data_type: "示例数据"
  year: 2024
  sources:
    - "NVIDIA 官方技术文档及发布会（示例数据）"
    - "AMD 官方技术白皮书（示例数据）"
    - "Intel 官方技术文档（示例数据）"
    - "Google Cloud 官方文档（示例数据）"
    - "AWS re:Invent 发布会资料（示例数据）"
    - "华为官方公告及行业媒体报道（示例数据）"
    - "寒武纪公司公告（示例数据）"
    - "行业分析机构综合估算（示例数据）"

# -------------------------------------------------------
# 市场份额数据（全球 AI 加速器市场，2024 年估算）
# 数据类型：示例数据
# -------------------------------------------------------
market_share_global_2024:
  unit: "百分比区间（%）"
  note: "示例数据，基于行业报告综合估算"
  players:
    - name: NVIDIA
      share_range: "70–80"
      notes: "含 H100/H200/A100/L40S 等数据中心产品线"
    - name: AMD
      share_range: "8–12"
      notes: "主要来自 MI300X 系列"
    - name: Intel
      share_range: "2–4"
      notes: "Gaudi 系列，份额持续下滑"
    - name: 华为昇腾
      share_range: "<5"
      notes: "主要服务中国市场，受出口管制影响全球份额低"
    - name: 其他（含云厂商自研）
      share_range: "3–8"
      notes: "包含 Google TPU、AWS Trainium 内部消化部分及其他国产芯片"

market_share_china_2024:
  unit: "百分比区间（%）"
  note: "示例数据，中国境内 AI 训练加速器市场"
  players:
    - name: 华为昇腾
      share_range: "50–60"
    - name: NVIDIA
      share_range: "20–30"
      notes: "受 A100/H800 出口管制影响，份额下降"
    - name: 寒武纪
      share_range: "3–5"
    - name: 其他国产（燧原、壁仞等）
      share_range: "5–10"
    - name: AMD / Intel
      share_range: "<5"

