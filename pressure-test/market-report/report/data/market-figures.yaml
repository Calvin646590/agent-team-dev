growth_drivers:
  - factor: "大语言模型（LLM）规模化训练需求"
    impact: "高"
  - factor: "生成式 AI 应用商业化落地"
    impact: "高"
  - factor: "边缘 AI 与 AI PC / AI 手机普及"
    impact: "中-高"
  - factor: "汽车自动驾驶芯片需求增长"
    impact: "中"
  - factor: "主权 AI / 国产替代政策推动"
